name: App Build & Deploy

# 1. 자동 트리거(push, pr)를 삭제하고 수동(workflow_dispatch)만 남깁니다.
on:
  workflow_dispatch:
    inputs:
      deploy_to_playstore:
        description: '구글 플레이 스토어에 배포할까요? (true 입력 시 배포)'
        required: true
        default: false
        type: boolean
      release_track:
        description: '배포 트랙을 선택하세요 (internal, alpha, beta, production)'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4 # 최신 v4 권장

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 환경 설정 파일 복구 (Secrets 기반)
      - name: Prepare Google Service json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > ./app/google-services.json

      - name: Prepare Keystore
        run: echo '${{ secrets.DESK_CLOCK_KEYSTORE_ENCODED }}' | base64 -d > ./app/deskclock-keystore.jks

      - name: Prepare Local.Properties
        run: echo '${{ secrets.LOCAL_PROPERTIES }}' > ./local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # --- 빌드 단계 ---
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release Bundle (AAB)
        run: ./gradlew bundleRelease --stacktrace

      # --- 산출물 보관 (Artifacts) ---
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/*.aab

      # --- 플레이 스토어 배포 (조건부 실행) ---
      - name: Upload to Google Play
        # 사용자가 체크박스를 선택(true)했을 때만 실행됨
        if: github.event.inputs.deploy_to_playstore == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PACKAGE_NAME }}
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.release_track }}
          status: completed # 즉시 출시 모드
